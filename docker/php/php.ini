; ============================================================
; SIGEDOC - PHP Configuration (Docker)
; ============================================================

; ── Rendimiento ─────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ── Uploads de documentos ────────────────────────────────────
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; ── Errores (producción: ocultar al cliente) ─────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
expose_php = Off


; ── Sesiones ────────────────────────────────────────────────
session.cookie_httponly = 1
session.use_only_cookies = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 7200

; ── Zona horaria ────────────────────────────────────────────
date.timezone = America/Santo_Domingo

; ── OPcache (rendimiento PHP) ────────────────────────────────
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; ── Codificación ────────────────────────────────────────────
default_charset = UTF-8
mbstring.language = UTF-8

; ── ODBC / SQL Server ────────────────────────────────────────
; Aumentar timeout de conexión para BD externa
mssql.connect_timeout = 10
